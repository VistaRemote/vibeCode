name: Meta-Repo CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  packages: read

jobs:
  biome:
    name: Scaffold lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.11'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Biome check
        run: pnpm check

  security-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.11'
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm audit --audit-level=high

  plan-check:
    name: Implementation plan checklist
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.11'
      - name: Check unchecked plan items
        run: pnpm plan:check

  server:
    name: Server build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24.11"
          registry-url: https://npm.pkg.github.com
          scope: "@luminaryworks"
      - run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
      - run: pnpm build
